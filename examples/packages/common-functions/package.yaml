format: 1
package: common-functions
version: 1.0.0
authors: [SharpMUSH]
description: "Global UI-helper functions: header(), footer(), line() — full-width rules with an optional centered title."
license: MIT
homepage: https://github.com/SharpMUSH/SharpMUSH-Packages
keywords: [ui, formatting, functions]
requires_server: ">=0.1"

# Create mode: a single owned thing carries the softcode the global functions
# evaluate. AINSTALL registers header()/footer()/line() once at install; STARTUP
# re-registers them on every boot (the global-function registry is in-memory).
objects:
  - ref: functions
    type: thing
    name: Common Functions
    attributes:
      # Rule sized to the caller's client width (width(%#) defaults to 78 when the
      # client doesn't report one), with an optional centered title. %0 = title,
      # %1 = explicit width override. A title is padded with spaces; fill is '='.
      HEADER: |-
        center(if(strlen(%0),[space(1)]%0[space(1)],),firstof(%1,width(%#)),=)
      # Same as HEADER, drawn at the bottom of a block.
      FOOTER: |-
        center(if(strlen(%0),[space(1)]%0[space(1)],),firstof(%1,width(%#)),=)
      # Lighter divider filled with '-'.
      LINE: |-
        center(if(strlen(%0),[space(1)]%0[space(1)],),firstof(%1,width(%#)),-)
      # Runs once, immediately after the first install: register the three
      # global user functions, each evaluating an attribute on this object.
      AINSTALL: |-
        @function header=%!,HEADER,0,2; @function footer=%!,FOOTER,0,2; @function line=%!,LINE,0,2
      # Runs on every server boot: re-establish the in-memory registrations.
      STARTUP: |-
        @function header=%!,HEADER,0,2; @function footer=%!,FOOTER,0,2; @function line=%!,LINE,0,2
