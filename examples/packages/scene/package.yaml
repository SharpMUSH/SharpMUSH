format: 1
package: scene
version: 1.0.0
authors: [SharpMUSH]
description: "Scene Logger: pose/say/semipose capture into the Scene System, plus the +scene/* player verbs. Ships the game policy the C# engine deliberately omits."
license: MIT
homepage: https://github.com/SharpMUSH/SharpMUSH-Packages
keywords: [scene, rp, logging, capture, hooks]
requires_server: ">=0.1"

# Create mode: a single owned WIZARD thing carries the capture hooks and the
# +scene/* verbs. It MUST be WIZARD — it is the @hook/override target, runs the
# wizard-only @scene / @hook commands, and AINSTALL/STARTUP run as this object
# (so %! / me = this object and self-execution of the wizard-locked @hook works).
#
# AINSTALL runs once after first install; STARTUP runs on every boot. Both
# (re-)establish the three OVERRIDE hooks idempotently — immediate on install,
# re-set on each boot (the hook registry is rebuilt from softcode policy).
#
# Capture is the ONLY pose-recording path: an @hook/override on POSE/SAY/SEMIPOSE
# reproduces the built-in room emit EXACTLY, then records the pose via the
# @scene/addpose COMMAND. @EMIT is deliberately NOT hooked. Reads use the
# scene… functions; all data-writes use @scene/* commands (never side-effect fns).
#
# Attribute organization follows the project FUN`/CMD`/DATA`/INCLUDE` tree
# convention (see the common-functions and http-handler packages):
#   DATA`*     — config/constant knobs (reads, replaces a SceneOptions config)
#   FUN`*      — pure reads / guards (called via u())
#   CMD`*      — player verbs + capture $-commands (writes go through @scene/*)
#   INCLUDE`*  — shared command tails composed via @include (keep attrs small)
objects:
  - ref: logger
    type: thing
    name: Scene Logger
    flags: [WIZARD]
    attributes:
      # ---- policy knobs (read by the verbs; replaces a SceneOptions config) ----
      DATA`CAPTURE: |-
        1
      DATA`DEFAULT_STATUS: |-
        new

      # ---- owner / wizard guard -------------------------------------------------
      FUN`OWNS: |-
        or(orflags(%0,Wz),strmatch(scene(%1,owner),%0))

      # ---- capture hooks --------------------------------------------------------
      # Each hook reproduces its type-specific built-in room emit byte-for-byte, then
      # records the rendered line. The capture tail is INLINED into each hook (not
      # factored into an @include attribute): @include cannot resolve an attribute
      # name that contains a backtick (e.g. INCLUDE`CAPTURE) — only get()/u() do — so
      # an @include of the shared tail silently no-ops and nothing is captured.
      #
      # The tail (a) @asserts a scene is active in this room AND the poser is focused on
      # it, then (b) records the rendered line with @scene/addpose (explicit author %#).
      # The two @asserts halt the command list AFTER the emit already fired, so a pose
      # outside any scene behaves exactly like the un-hooked built-in.

      # Built-in POSE (MoreCommands.Pose) emits: "<name> <message>" to the room.
      CMD`CAPTURE`POSE: |-
        $pose *: @emit [name(%#)] %0; @assert words(scenewhere(%L)); @assert strmatch(scenefocus(%#),scenewhere(%L)); @scene/addpose [scenewhere(%L)]=%#,[scenemember(scenewhere(%L),%#,showas)],%L,pose,,[name(%#)] %0

      # Built-in SAY (MoreCommands.Say) emits "You say, \"<msg>\"" to the speaker
      # and "<name> says, \"<msg>\"" to everyone else in the room.
      CMD`CAPTURE`SAY: |-
        $say *: @pemit %#=You say, "%0"; @oemit %L/%#=[name(%#)] says, "%0"; @assert words(scenewhere(%L)); @assert strmatch(scenefocus(%#),scenewhere(%L)); @scene/addpose [scenewhere(%L)]=%#,[scenemember(scenewhere(%L),%#,showas)],%L,say,,[name(%#)] says\, "%0"

      # Built-in SEMIPOSE (MoreCommands.SemiPose) emits "<name><message>" (no space).
      CMD`CAPTURE`SEMI: |-
        $;*: @emit [name(%#)]%0; @assert words(scenewhere(%L)); @assert strmatch(scenefocus(%#),scenewhere(%L)); @scene/addpose [scenewhere(%L)]=%#,[scenemember(scenewhere(%L),%#,showas)],%L,semipose,,[name(%#)]%0

      # ---- create / lifecycle ---------------------------------------------------
      # NOTE: capture the new scene id into %q0 with @assert (it both sets the register and
      # aborts cleanly if creation fails — the id is truthy), then drive the writes off %q0.
      # IMPORTANT: the body is one PHYSICAL line with `;` separators. q-registers are shared
      # across `;`-separated commands but NOT across newline-separated ones in a $-command
      # body, so the original multi-line `|-` form lost %q0 between writes. The original
      # `&MY.SID %#=[setr(0,…)]` also failed (setr inside an &attr=<value> RHS doesn't
      # propagate its register); @assert in command position does.
      CMD`CREATE: |-
        $+scene/create *: @assert setr(0,scenecreate(%L,%#,%0)); @scene/member %q0/owner=%#; @scene/focus %#=%q0; @scene/set %q0/status=[get(%!/DATA`DEFAULT_STATUS)]; @pemit %#=Scene %q0 created and focused.; &MY.SID %#=%q0

      # NOTE: verb bodies are written as ONE physical line with `;` separators. In a
      # multi-line ($-command) attribute the FIRST command after the `$pattern:` header does
      # not parse cleanly (the following line's leading `@scene…` leaks into it) and
      # q-registers do not cross newlines — the `;` form is robust on both counts.
      CMD`START: |-
        $+scene/start: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/set [scenefocus(%#)]/status=active; @pemit %#=Scene is now active.

      CMD`PAUSE: |-
        $+scene/pause: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/set [scenefocus(%#)]/status=paused; @pemit %#=Scene paused.

      CMD`FINISH: |-
        $+scene/finish: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/set [scenefocus(%#)]/status=finished; @scene/focus %#=; @pemit %#=Scene finished.

      # ---- membership / RSVP / focus --------------------------------------------
      CMD`JOIN: |-
        $+scene/join *: @scene/member %0/participant=%#; @scene/focus %#=%0; @pemit %#=Joined and focused on scene %0.

      # NOTE: one physical line (q-registers cross `;` but not newlines in a $-command body).
      # Capture the focused scene id into %q0 BEFORE @scene/focus clears it (@assert sets the
      # register and no-ops cleanly when not focused), then drive the writes off %q0.
      CMD`LEAVE: |-
        $+scene/leave: @assert setr(0,scenefocus(%#)); @scene/focus %#=; @if not(words(sceneposes(%q0,%#)))={@scene/unmember %q0=%#}; @pemit %#=Left the scene.; &MY.SID %#=%q0

      CMD`TAG: |-
        $+scene/tag *: @scene/member %0/attending=%#; @pemit %#=RSVP'd to scene %0.

      CMD`UNTAG: |-
        $+scene/untag *: @scene/unmember %0=%#; @pemit %#=Removed RSVP from scene %0.

      CMD`SHOWAS: |-
        $+scene/showas *: @scene/showas [scenefocus(%#)]/%#=%0; @pemit %#=Future poses show as: %0

      # ---- edit your own poses --------------------------------------------------
      # %1 is find^^^replace; author-only is enforced by @scene/editpose. Compute the new
      # content into %q0 in a separate command first (a nested function reference to the
      # verb's %0/%1 inside an @scene arg does not resolve reliably), then edit off %q0.
      CMD`EDIT: |-
        $+scene/edit *=*: @assert setr(1,%0); @assert setr(0,edit(scenepose(scenefocus(%#),%q1,content),before(%1,^^^),after(%1,^^^))); @scene/editpose %q1=%#,%q0

      CMD`UNDO: |-
        $+scene/undo *: @scene/undo %0

      CMD`REDO: |-
        $+scene/redo *: @scene/redo %0

      CMD`DELETE: |-
        $+scene/delete *: @scene/delete %0

      CMD`MOVE: |-
        $+scene/move *=*: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/move %0=%1

      # ---- visibility -----------------------------------------------------------
      CMD`PUBLIC: |-
        $+scene/public: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/set [scenefocus(%#)]/public=1; @pemit %#=Scene is now public.

      CMD`PRIVATE: |-
        $+scene/private: @assert u(%!/FUN`OWNS,%#,scenefocus(%#)); @scene/set [scenefocus(%#)]/public=0; @pemit %#=Scene is now private.

      # ---- viewing --------------------------------------------------------------
      CMD`WHO: |-
        $+scene/who *: @pemit %#=Cast: [scenecast(%0)]%r[iter(scenemembers(%0),[name(##)] ([scenemember(%0,##,role)]))]

      # sceneposes() returns a SPACE-separated id list, so iter() must use the default
      # space input delimiter (an `@` input delim collapsed the whole list into one bogus
      # id → #-1). %r is the output separator (one pose content per line).
      CMD`RECAP: |-
        $+scene/recap *: @pemit %#=[iter(sceneposes(scenefocus(%#),,%0),scenepose(scenefocus(%#),##,content),%b,%r)]

      # ---- pose tracker (+pot): query-on-run turn tracker for the focused scene --
      # No hooks, no state: rebuilt each run from the recorded poses. A member's last
      # pose time is sceneposes(scene,member,1) -> scenepose(...,createdat) (Unix-millis,
      # diffed against msecs()). Members are ordered OLDEST-pose-first, so whoever is
      # most overdue sits at the top, flagged up-next. Columns align to width(%#).
      FUN`POT_MS: |-
        firstof(scenepose(%0,sceneposes(%0,%1,1),createdat),0)
      FUN`POT_IDLE: |-
        switch(setr(9,u(%!/FUN`POT_MS,%0,%1)),0,-,timestring(div(sub(msecs(),%q9),1000)))
      FUN`POT_KEY: |-
        [rjust(u(%!/FUN`POT_MS,%0,%1),15,0)]~%1
      FUN`POT_ROW: |-
        align(>3 <[sub(%3,30)] >14 <9,%2,[name(%1)][switch(scenemember(%0,%1,showas),,,%b\([scenemember(%0,%1,showas)]\))],u(%!/FUN`POT_IDLE,%0,%1),switch(%2,1,<- up,))
      CMD`POT: |-
        $+scene/pot: @pemit %#=[setq(0,scenefocus(%#))][switch(words(%q0),0,You are not focused on a scene. Use +scene/join <id> or +scene/create <title>.,[header(Pose Tracker - Scene %q0,width(%#))]%r[iter(sort(iter(scenemembers(%q0),u(%!/FUN`POT_KEY,%q0,##))),u(%!/FUN`POT_ROW,%q0,after(##,~),inum(0),width(%#)),,%r)]%r[footer([words(scenemembers(%q0))] in scene - oldest pose is up next,width(%#))])]

      # ---- lifecycle: (re-)establish the three OVERRIDE capture hooks -----------
      # PennMUSH form: @hook/<type> <command> = <object>, <attribute> (RSArgs comma-split).
      AINSTALL: |-
        @hook/override POSE=%!,CMD`CAPTURE`POSE; @hook/override SAY=%!,CMD`CAPTURE`SAY; @hook/override SEMIPOSE=%!,CMD`CAPTURE`SEMI
      STARTUP: |-
        @hook/override POSE=%!,CMD`CAPTURE`POSE; @hook/override SAY=%!,CMD`CAPTURE`SAY; @hook/override SEMIPOSE=%!,CMD`CAPTURE`SEMI
