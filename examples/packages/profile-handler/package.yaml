format: 1
package: profile-handler
version: 1.1.0
authors: [SharpMUSH]
description: "Read-only character directory, online list, and profile API, served through the HTTP verb routers."
license: MIT
homepage: https://github.com/SharpMUSH/SharpMUSH-Packages
keywords: [http, api, profile, portal]
requires_server: ">=0.1"

# Requires the verb routers — its GET`* routes are backtick children of the GET
# verb that http-handler provides. The dependency also blocks uninstalling
# http-handler while this is installed.
depends:
  - package: http-handler
    version: ">=1.0 <2.0"
    source:
      repo: https://github.com/SharpMUSH/SharpMUSH-Packages
      path: http-handler/

objects:
  - ref: handler
    target: "{{$http_handler}}"
    attributes:
      # ── Helpers (me-relative; redefinable per game) ──────────────────────
      # One profile field as the {value, visible} shape. %0 = objid, %1 = key.
      FN`FIELD: |-
        json(object,value,json(string,get(%0/PROFILE`%1)),visible,json(boolean,true))
      # Directory category for one player (%0). Wizard > Royalty > Guest; blank otherwise.
      FN`CHARCAT: |-
        firstof(if(hasflag(%0,WIZARD),Wizard),if(hasflag(%0,ROYALTY),Royalty),if(haspower(%0,Guest),Guest))
      # One character-directory row. %0 = player. created = unix ms.
      FN`CHARROW: |-
        json(object,name,json(string,name(%0)),objid,json(string,objid(%0)),created,json(number,ctime(%0,1)),category,json(string,u(FN`CHARCAT,%0)))
      # Directory visibility predicate (%0): 1 lists, 0 hides. Default hides Guests and the
      # package_manager system principal — it is seeded as a real PLAYER because it owns
      # softcode-package objects, so a type search finds it, but nobody plays it. Matched by
      # config ref, not a literal dbref: the seed numbering is config-driven and has moved.
      FN`CHARVIS: |-
        cand(not(strmatch(u(FN`CHARCAT,%0),Guest)),not(strmatch(num(%0),num({{$package_manager}}))))
      # Online visibility predicate (%0): the directory rules, plus DARK. lwho() applies
      # CanSee() against the *caller*, and this handler is wizard-flagged — for a privileged
      # looker CanSee() is unconditionally true, so without this a DARK player would be
      # exposed to anonymous web visitors. Hide them here instead.
      FN`ONLINEVIS: |-
        cand(u(FN`CHARVIS,%0),not(hasflag(%0,DARK)))

      # ── Routes (children of http-handler's GET verb) ─────────────────────
      # Both routes build their array with json_array(iter(...)) over a %r-separated list.
      # json_array() splits its input BEFORE parsing each element, so the separator must be
      # something a row cannot contain: names routinely contain spaces (the default separator),
      # newlines cannot occur. It also yields [] for an empty list, so neither route needs a
      # base-case guard.
      #
      # GET /http/characters — every visible player as a JSON array. This is the roster: it says
      # who EXISTS, not who is connected. For connections see GET`ONLINE.
      GET`CHARACTERS: |-
        @respond/type application/json; think json_array(iter(filter(me/FN`CHARVIS,lsearch(all,type,player)),u(me/FN`CHARROW,%i0),,%r),%r)
      # GET /http/online — connected, visible players, same row shape as GET`CHARACTERS.
      # lwho() is the authoritative connection list (the same source WHO reads), so objects that
      # never bind a connection — seeded principals like package_manager — can't appear here.
      GET`ONLINE: |-
        @respond/type application/json; think json_array(iter(filter(me/FN`ONLINEVIS,lwho()),u(me/FN`CHARROW,%i0),,%r),%r)
      # GET /http/profile?objid=#1:123 — one character's public profile.
      GET`PROFILE: |-
        @assert cand(isdbref(%q<form.objid>),hastype(%q<form.objid>,player))=@respond 404 NO SUCH CHARACTER; @respond/type application/json; think json(object,character,json(string,name(%q<form.objid>)),objid,json(string,objid(%q<form.objid>)),dbref,json(string,num(%q<form.objid>)),fields,json(object,fullname,u(FN`FIELD,%q<form.objid>,fullname),alias,u(FN`FIELD,%q<form.objid>,alias),age,u(FN`FIELD,%q<form.objid>,age),concept,u(FN`FIELD,%q<form.objid>,concept),faction,u(FN`FIELD,%q<form.objid>,faction),description,u(FN`FIELD,%q<form.objid>,description)))
      # GET /http/profile/schema — the Portal Schema Document the portal renders from
      # (Area 21, kind:"view"). The character profile is the canonical view instance:
      # sections → keyvalue-style field elements; the GET`PROFILE data endpoint supplies
      # {value, visible} per key.
      GET`PROFILE`SCHEMA: |-
        @respond/type application/json; think json(object,kind,json(string,view),schema_version,json(number,1),pages,json(array,json(object,key,json(string,profile),order,json(number,1),sections,json(array,json(object,name,json(string,Demographics),order,json(number,1),elements,json(array,json(object,kind,json(string,field),key,json(string,fullname),label,json(string,Full Name),type,json(string,text),visible_to,json(string,public)),json(object,kind,json(string,field),key,json(string,alias),label,json(string,Alias),type,json(string,text),visible_to,json(string,public)),json(object,kind,json(string,field),key,json(string,age),label,json(string,Age),type,json(string,text),visible_to,json(string,public)),json(object,kind,json(string,field),key,json(string,concept),label,json(string,Concept),type,json(string,text),visible_to,json(string,public)))),json(object,name,json(string,Status),order,json(number,2),elements,json(array,json(object,kind,json(string,field),key,json(string,faction),label,json(string,Faction),type,json(string,text),visible_to,json(string,public)))),json(object,name,json(string,Description),order,json(number,3),elements,json(array,json(object,kind,json(string,field),key,json(string,description),label,json(string,Description),type,json(string,mstring),visible_to,json(string,public))))))))
