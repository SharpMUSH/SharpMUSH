format: 1
package: profile-handler
version: 1.0.0
authors: [SharpMUSH]
description: "Read-only character directory and profile API, served through the HTTP verb routers."
license: MIT
homepage: https://github.com/SharpMUSH/SharpMUSH-Packages
keywords: [http, api, profile, portal]
requires_server: ">=0.1"

# Requires the verb routers — its GET`* routes are backtick children of the GET
# verb that http-handler provides. The dependency also blocks uninstalling
# http-handler while this is installed.
depends:
  - package: http-handler
    version: ">=1.0 <2.0"
    source:
      repo: https://github.com/SharpMUSH/SharpMUSH-Packages
      path: http-handler/

objects:
  - ref: handler
    target: "{{$http_handler}}"
    attributes:
      # ── Helpers (me-relative; redefinable per game) ──────────────────────
      # One profile field as the {value, visible} shape. %0 = objid, %1 = key.
      FN`FIELD: |-
        json(object,value,json(string,get(%0/PROFILE`%1)),visible,json(boolean,true))
      # Directory category for one player (%0). Wizard > Royalty > Guest; blank otherwise.
      FN`CHARCAT: |-
        firstof(if(hasflag(%0,WIZARD),Wizard),if(hasflag(%0,ROYALTY),Royalty),if(haspower(%0,Guest),Guest))
      # One character-directory row. %0 = player. created = unix ms.
      FN`CHARROW: |-
        json(object,name,json(string,name(%0)),objid,json(string,objid(%0)),created,json(number,ctime(%0,1)),category,json(string,u(FN`CHARCAT,%0)))
      # fold() step: append a row to the JSON array. %0 = array so far, %1 = player.
      FN`JARRINS: |-
        json_mod(%0,insert,$\[[json_query(%0,size)]\],u(FN`CHARROW,%1))
      # Directory visibility predicate (%0): 1 lists, 0 hides. Default hides Guests.
      FN`CHARVIS: |-
        not(strmatch(u(FN`CHARCAT,%0),Guest))

      # ── Routes (children of http-handler's GET verb) ─────────────────────
      # GET /http/characters — every visible player as a JSON array.
      GET`CHARACTERS: |-
        @respond/type application/json; think fold(me/FN`JARRINS,filter(me/FN`CHARVIS,lsearch(all,type,player)),\[\])
      # GET /http/profile?objid=#1:123 — one character's public profile.
      GET`PROFILE: |-
        @assert cand(isdbref(%q<form.objid>),hastype(%q<form.objid>,player))=@respond 404 NO SUCH CHARACTER; @respond/type application/json; think json(object,character,json(string,name(%q<form.objid>)),objid,json(string,objid(%q<form.objid>)),dbref,json(string,num(%q<form.objid>)),fields,json(object,fullname,u(FN`FIELD,%q<form.objid>,fullname),alias,u(FN`FIELD,%q<form.objid>,alias),age,u(FN`FIELD,%q<form.objid>,age),concept,u(FN`FIELD,%q<form.objid>,concept),faction,u(FN`FIELD,%q<form.objid>,faction),description,u(FN`FIELD,%q<form.objid>,description)))
      # GET /http/profile/schema — the field/section schema the portal renders from.
      GET`PROFILE`SCHEMA: |-
        @respond/type application/json; think json(object,sections,json(array,json(object,name,json(string,Demographics),order,json(number,1),fields,json(array,json(object,key,json(string,fullname),label,json(string,Full Name),type,json(string,text),visible_to,json(string,public),max_length,json(number,120)),json(object,key,json(string,alias),label,json(string,Alias),type,json(string,text),visible_to,json(string,public)),json(object,key,json(string,age),label,json(string,Age),type,json(string,text),visible_to,json(string,public)),json(object,key,json(string,concept),label,json(string,Concept),type,json(string,text),visible_to,json(string,public)))),json(object,name,json(string,Status),order,json(number,2),fields,json(array,json(object,key,json(string,faction),label,json(string,Faction),type,json(string,text),visible_to,json(string,public)))),json(object,name,json(string,Description),order,json(number,3),fields,json(array,json(object,key,json(string,description),label,json(string,Description),type,json(string,mstring),visible_to,json(string,public))))))
