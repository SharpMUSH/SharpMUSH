name: SharpMUSH Example Packages
description: Reference packages demonstrating the package.yaml manifest format.
packages:
  - path: hello-world/
    package: hello-world
    version: 1.0.0
    description: Minimal example — one object, one command
  - path: who-where/
    name: Who/Where
    package: who-where
    version: 1.2.0
    description: +who and +where commands
  - path: bbs-lite/
    name: BBS Lite
    package: bbs-lite
    version: 0.9.0-beta
    description: Tiny bulletin board — dependencies, configure, cross-package refs
  - path: starter-area/
    package: starter-area
    version: 1.0.0
    description: Two rooms and linked exits
  - path: http-handler/
    package: http-handler
    version: 1.0.0
    description: Inbound HTTP verb routers (attach mode)
  - path: profile-handler/
    package: profile-handler
    version: 1.0.0
    description: Read-only character directory + profile API (requires http-handler)
  - path: chargen/
    package: chargen
    version: 1.0.0
    description: Dynamic Application (Area 21) — a character-application form (requires http-handler)
  - path: chargen-app/
    package: chargen-app
    version: 1.0.0
    description: Application package (Area 21) — registers chargen as a portal page (requires chargen)
  - path: common-functions/
    package: common-functions
    version: 1.0.0
    description: "Global UI-helper functions: header(), footer(), line()"
  - path: scene/
    package: scene
    version: 1.0.0
    description: Scene Logger — pose/say/semipose capture + the +scene/* player verbs (bundled default)
  - path: hello-ui/
    name: Hello UI
    package: hello-ui
    version: 1.0.0
    description: "Managed DLL package (Phase 4) — a UI plugin: controller + IApplicationSource page under \"Examples\""
