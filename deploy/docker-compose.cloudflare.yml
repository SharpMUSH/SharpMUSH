# SharpMUSH — hobby-scale stack fronted by CLOUDFLARE (single host).
#
# Difference vs docker-compose.prod.yml: TLS + web ingress are handled by Cloudflare,
# not Caddy. A `cloudflared` tunnel dials OUT to Cloudflare, so:
#   - no inbound 80/443 to open, no Let's Encrypt cert to manage
#   - the origin server's IP stays hidden behind Cloudflare
#   - the ASP.NET server is never published to the host — cloudflared reaches it
#     over the private docker network.
#
# IMPORTANT — telnet is NOT proxied by Cloudflare:
#   Cloudflare's proxy only carries HTTP/HTTPS + WebSockets. Raw telnet (:4201) is
#   plain TCP and cannot go through the orange cloud on free/standard plans (that
#   needs paid Spectrum). So telnet is published DIRECTLY on this host, and you
#   point a DNS-ONLY (grey-cloud) record — e.g. telnet.mush.example.com — at the
#   origin IP. The web portal/SignalR/WebSocket go through the tunnel; telnet does not.
#
# Setup:
#   1. In the Cloudflare Zero Trust dashboard, create a Tunnel, copy its token into
#      CLOUDFLARE_TUNNEL_TOKEN in .env.
#   2. Add a Public Hostname on that tunnel:  mush.example.com  ->  http://sharpmush-server:8080
#      (add a second one for the websocket gateway if you route it via the domain:
#       ws.mush.example.com -> http://connectionserver:4202)
#   3. Add a DNS-only A/AAAA record for telnet -> this host's IP.
#   4. docker compose -f deploy/docker-compose.cloudflare.yml up -d --build

services:
  nats:
    image: nats:2.10-alpine
    container_name: sharpmush-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    networks:
      - sharpmush-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8222/healthz -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

  connectionserver:
    # CI-published image (docker-dev.yml pushes :dev on every main merge, gated on the full test
    # suite). The box never builds — watchtower below pulls and recreates when the tag moves.
    image: sharpmush/sharpmush-connectionserver:dev
    container_name: sharpmush-connectionserver
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "4201:4201"   # telnet — DIRECT to host (Cloudflare can't proxy raw TCP); use a DNS-only record
    networks:
      - sharpmush-net
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  sharpmush-server:
    # CI-published image; includes the Blazor WASM client (baked into /app/wwwroot at build time).
    image: sharpmush/sharpmush-server:dev
    container_name: sharpmush-server
    labels:
      - com.centurylinklabs.watchtower.enable=true
    environment:
      - SHARPMUSH_DATABASE_PROVIDER=surrealdb
      - SHARPMUSH_SURREALDB_ENDPOINT=rocksdb://data/surreal
      - Wiki__AssetRoot=/app/data/wiki-assets
      - NATS_URL=nats://nats:4222
      # HTTP only — Cloudflare terminates TLS at the edge and the tunnel reaches this over the private network.
      - ASPNETCORE_URLS=http://+:8080
      # Neutralize the dev-cert path baked into the image's ENV. Kestrel eagerly loads the "Default"
      # certificate whenever that config exists, and the dev .pfx isn't in a prod image, so it would
      # crash on boot even though we only serve HTTP. Empty path = no cert loaded.
      - ASPNETCORE_Kestrel__Certificates__Default__Path=
      - ASPNETCORE_Kestrel__Certificates__Default__Password=
      # Trust cloudflared's X-Forwarded-Proto/-For (SharpMUSH.Server's own UseForwardedHeaders,
      # configured from this "ForwardedHeaders:KnownProxies" list — NOT the framework's
      # ASPNETCORE_FORWARDEDHEADERS_ENABLED shortcut, which trusts the header from ANY source and
      # would let an internet client spoof its own IP; Startup forces ForwardedHeaders.None whenever
      # no KnownProxies/KnownNetworks are configured, so that shortcut alone does nothing here).
      # Without this the app (which always calls UseHttpsRedirection) sees the plain-HTTP backend
      # hop from the tunnel and redirect-loops, and rate-limiting/sitelock/session-origin logic sees
      # cloudflared's IP instead of the real client. cloudflared is pinned to a static address on
      # sharpmush-net (below) so this stays valid across container recreates.
      - ForwardedHeaders__KnownProxies__0=172.29.0.10
    volumes:
      - app-data:/app/data
    # NOTE: no `ports:` — the server is only reachable via the tunnel and the internal network.
    depends_on:
      nats:
        condition: service_healthy
      connectionserver:
        condition: service_started
    networks:
      - sharpmush-net
    mem_limit: 768m
    cpus: 1.5
    restart: unless-stopped

  # Cloudflare Tunnel: dials out to Cloudflare, routes the public hostname(s) you
  # configured in the Zero Trust dashboard to the services on this network.
  cloudflared:
    image: cloudflare/cloudflared:2026.7.1   # pinned (not :latest) for reproducible deploys
    container_name: sharpmush-cloudflared
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?set CLOUDFLARE_TUNNEL_TOKEN in deploy/.env}
    depends_on:
      - sharpmush-server
      - connectionserver
    networks:
      # Pinned (not the plain list form used elsewhere) so its IP is stable across recreates —
      # sharpmush-server's ForwardedHeaders:KnownProxies trusts this exact address (mirrors how
      # docker-compose.prod.yml pins Caddy).
      sharpmush-net:
        ipv4_address: 172.29.0.10
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

  # Auto-deploy: polls Docker Hub and recreates the two labeled services when their :dev tag
  # moves (pushed by docker-dev.yml after the full test suite passes on main). Label-scoped so
  # nats/cloudflared/backup are never touched; CLEANUP prunes superseded images so unattended
  # updates cannot fill the disk. No inbound access needed — fits the tunnel-only posture.
  watchtower:
    image: containrrr/watchtower:1.7.1   # pinned (not :latest) for reproducible deploys
    container_name: sharpmush-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
    networks:
      - sharpmush-net
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped

  # Nightly encrypted backup of the game-data volume — identical to the prod stack.
  #
  # OPT-IN. Backups are off unless you enable the "backup" profile, which you do by setting
  # COMPOSE_PROFILES=backup in deploy/.env (see .env.example) — so the stack has no half-configured
  # backup state: either .env carries real restic credentials and the profile is on, or the service
  # does not exist at all. Without this, an unconfigured box ran restic against a placeholder repo
  # and crash-looped on `b2_authorize_account: 401` forever.
  #
  # Note the vars below are NOT `:?`-guarded like the rest of this file. Compose interpolates every
  # service in the file *before* it filters by profile, so a `:?` here would abort the whole stack
  # even with the profile off — the exact failure the profile exists to prevent. `:-` keeps
  # interpolation quiet; restic itself reports a missing repository if you enable the profile
  # without configuring it.
  backup:
    image: mazzolino/restic:1.8      # pinned (not :latest) so backups are reproducible
    container_name: sharpmush-backup
    hostname: sharpmush
    profiles: [backup]
    environment:
      - RUN_ON_STARTUP=false
      - BACKUP_CRON=0 30 3 * * *
      - RESTIC_REPOSITORY=${RESTIC_REPOSITORY:-}
      - RESTIC_PASSWORD=${RESTIC_PASSWORD:-}
      - RESTIC_BACKUP_SOURCES=/data
      - RESTIC_BACKUP_ARGS=--tag sharpmush --host sharpmush
      - RESTIC_FORGET_ARGS=--keep-daily 7 --keep-weekly 4 --prune
      - B2_ACCOUNT_ID=${B2_ACCOUNT_ID:-}
      - B2_ACCOUNT_KEY=${B2_ACCOUNT_KEY:-}
    volumes:
      - app-data:/data:ro
    networks:
      - sharpmush-net
    mem_limit: 256m
    cpus: 0.5
    restart: unless-stopped

volumes:
  app-data:
  nats-data:

networks:
  sharpmush-net:
    driver: bridge
    # Fixed subnet so cloudflared's static ipv4_address (above) and sharpmush-server's
    # ForwardedHeaders:KnownProxies (which must trust cloudflared's exact IP, not the header from
    # anyone) stay valid across `docker compose up` recreates.
    ipam:
      config:
        - subnet: 172.29.0.0/24
