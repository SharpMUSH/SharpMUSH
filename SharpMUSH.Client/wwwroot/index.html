<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SharpMUSH.Client</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="/_content/PSC.Blazor.Components.MarkdownEditor/css/markdowneditor.css" rel="stylesheet" />
    <link href="/_content/PSC.Blazor.Components.MarkdownEditor/css/easymde.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/idea.min.css" rel="stylesheet"
          integrity="sha512-Rfc5zQIp95eozfMCdS3B4MItUxU8orNje/t1OEhf7XwIk0DTCuMH2LG0NIgP8UGYK9L39WfUNI1c4IsM5yY/PA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preload" id="webassembly" />
    <link rel="icon" type="image/svg" href="assets/Logo.svg" />
    <link rel="preload" href="/fonts/cascadia-mono.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link href="css/custom.css" rel="stylesheet" />
    <link href="SharpMUSH.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div style="position: fixed; height: 100%; width: 100%; margin: 0; background-color: var(--mud-palette-appbar-background); background-image: var(--mud-palette-navbar-gradient); ">
            <div style="display: flex; justify-content: center; align-items:center; height:100%; width:100%;">
                <div class="b-demo-loading">
                    <img src="assets/Logo.svg" style="height: 500px;"  alt="Logo"/>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Third-party JS that Blazor components invoke via JSInterop must be loaded
         BEFORE blazor.webassembly.js.  Blazor WASM boots asynchronously (WASM
         fetch + compile), but OnAfterRenderAsync can fire before scripts placed
         after the Blazor boot script are evaluated, causing ReferenceErrors. -->
    <script src="/_content/PSC.Blazor.Components.MarkdownEditor/js/easymde.min.js"></script>
    <script src="/_content/PSC.Blazor.Components.MarkdownEditor/js/markdownEditor.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
            integrity="sha512-EBLzUL8XLl+va/zAsmXwS7Z2B1F9HUHkZwyS/VKwh3S7T/U0nF4BaU29EP/ZSf6zgiIxYAnKLu6bJ8dqpmX5uw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <!-- Monaco Editor (BlazorMonaco) — must come before blazor.webassembly.js -->
    <script src="_content/BlazorMonaco/jsInterop.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/loader.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.js"></script>
    <!-- SharpMUSH MUSH language definition for Monaco -->
    <script src="js/mush-monaco.js"></script>
    <!-- Terminal grid measurement and resize observer -->
    <script src="js/terminalMetrics.js"></script>

    <script src="js/webtransport.js"></script>
    <!-- Mermaid (wiki diagram rendering) + the wiki post-render pass (mermaid run + anchor scroll) -->
    <script src="js/mermaid.min.js"></script>
    <script src="js/wiki-render.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

</body>

</html>
