services:
  arangodb:
    image: arangodb:latest
    container_name: arangodb
    environment:
      - ARANGO_ROOT_PASSWORD=password
    ports:
      - "8529:8529"
    volumes:
      - arangodb-socket:/var/run/arangodb3
    command: ["arangod", "--server.endpoint", "tcp://0.0.0.0:8529", "--server.endpoint", "unix:///var/run/arangodb3/arangodb.sock"]
    networks:
      - sharpmush-net

  nats:
    image: nats:2-alpine
    container_name: sharpmush-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # NATS client port
      - "8222:8222"   # NATS monitoring port
    networks:
      - sharpmush-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8222/healthz -O /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  connectionserver:
    build:
      context: ./
      dockerfile: SharpMUSH.ConnectionServer/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
    ports:
      - "4201:4201" # Telnet
      - "4202:4202" # ConnectionServer HTTP API
      - "9091:9091" # Metrics endpoint (for external monitoring tools)
    networks:
      - sharpmush-net

  sharpmush-server:
    build:
      context: ./
      dockerfile: Dockerfile
    environment:
      - ARANGO_CONNECTION_STRING=Server=http://unusedschim:8529;User=root;Password=password;
      - NATS_URL=nats://nats:4222
    depends_on:
      arangodb:
        condition: service_started
      nats:
        condition: service_healthy
      connectionserver:
        condition: service_started
    ports:
      - "9092:9092" # Metrics endpoint (for external monitoring tools)
    volumes:
      - arangodb-socket:/var/run/arangodb3
    networks:
      - sharpmush-net
      
volumes:
  arangodb-socket:
  
networks:
  sharpmush-net:
    driver: bridge
