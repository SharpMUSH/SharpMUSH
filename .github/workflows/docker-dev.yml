name: Publish Dev Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/_dotnet-build-test.yml

  build-and-push-dev:
    needs: [build-and-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Each image is stamped with a content hash of its source closure (the project directories
      # its binaries are actually built from, walked via ProjectReference). When the closure is
      # unchanged, the push is skipped and the image digest on Docker Hub stays put — so the
      # watchtower on the production box does NOT recreate that container. This is what keeps
      # live telnet/WebSocket connections on the ConnectionServer alive across merges that only
      # touch the game server or portal.
      - name: Compute source stamps and compare with Docker Hub
        id: stamps
        run: |
          set -euo pipefail
          conn_dirs=$(python3 .github/scripts/project-closure.py SharpMUSH.ConnectionServer/SharpMUSH.ConnectionServer.csproj)
          server_dirs=$(python3 .github/scripts/project-closure.py SharpMUSH.Server/SharpMUSH.Server.csproj SharpMUSH.Client/SharpMUSH.Client.csproj)

          conn_stamp=$(git ls-files -s -- $conn_dirs SharpMUSH.ConnectionServer/Dockerfile global.json | sha256sum | cut -d' ' -f1)
          server_stamp=$(git ls-files -s -- $server_dirs Dockerfile global.json | sha256sum | cut -d' ' -f1)

          remote_conn=$(skopeo inspect "docker://docker.io/sharpmush/sharpmush-connectionserver:dev" \
            --format '{{ index .Labels "org.sharpmush.source-stamp" }}' 2>/dev/null || echo unknown)
          remote_server=$(skopeo inspect "docker://docker.io/sharpmush/sharpmush-server:dev" \
            --format '{{ index .Labels "org.sharpmush.source-stamp" }}' 2>/dev/null || echo unknown)

          echo "server: local=$server_stamp remote=$remote_server"
          echo "connectionserver: local=$conn_stamp remote=$remote_conn"

          {
            echo "server_stamp=$server_stamp"
            echo "conn_stamp=$conn_stamp"
            echo "push_server=$([ "$server_stamp" != "$remote_server" ] && echo true || echo false)"
            echo "push_conn=$([ "$conn_stamp" != "$remote_conn" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.stamps.outputs.push_server == 'true' || steps.stamps.outputs.push_conn == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        if: steps.stamps.outputs.push_server == 'true' || steps.stamps.outputs.push_conn == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push SharpMUSH Server (dev)
        if: steps.stamps.outputs.push_server == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: sharpmush/sharpmush-server:dev
          labels: |
            org.opencontainers.image.title=SharpMUSH Server
            org.opencontainers.image.description=Modern MUSH server implementation (dev build)
            org.opencontainers.image.version=dev
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.sharpmush.source-stamp=${{ steps.stamps.outputs.server_stamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ConnectionServer (dev)
        if: steps.stamps.outputs.push_conn == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./SharpMUSH.ConnectionServer/Dockerfile
          push: true
          tags: sharpmush/sharpmush-connectionserver:dev
          labels: |
            org.opencontainers.image.title=SharpMUSH ConnectionServer
            org.opencontainers.image.description=Connection server for SharpMUSH (dev build)
            org.opencontainers.image.version=dev
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.sharpmush.source-stamp=${{ steps.stamps.outputs.conn_stamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🐳 Dev Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.stamps.outputs.push_server }}" = "true" ]; then
            echo "- \`sharpmush/sharpmush-server:dev\` — **pushed** (source closure changed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`sharpmush/sharpmush-server:dev\` — skipped (unchanged; watchtower will not restart it)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.stamps.outputs.push_conn }}" = "true" ]; then
            echo "- \`sharpmush/sharpmush-connectionserver:dev\` — **pushed** (source closure changed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`sharpmush/sharpmush-connectionserver:dev\` — skipped (unchanged; live connections stay up)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
