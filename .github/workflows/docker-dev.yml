name: Publish Dev Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish:
        description: >-
          Force-publish images regardless of detected changes (recovery for a failed
          publish run — change detection compares commits, not what is on Docker Hub).
        type: choice
        options: [all, server, connectionserver]
        default: all

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/_dotnet-build-test.yml

  build-and-push-dev:
    needs: [build-and-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Watchtower on the production box recreates a container whenever its image digest moves,
      # which drops the ConnectionServer's live telnet/WebSocket sessions. Only publish an image
      # when something it is actually built from changed. Each filter lists the image's source
      # closure: the ProjectReference graph of its entry project(s), its Dockerfile, and
      # global.json. When project references change, update the lists to match.
      - name: Detect changed image inputs
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            connectionserver:
              - 'SharpMUSH.ConnectionServer/**'
              - 'SharpMUSH.Library/**'
              - 'SharpMUSH.Messaging/**'
              - 'SharpMUSH.MarkupString/**'
              - 'SharpMUSH.Configuration/**'
              - 'SharpMUSH.Configuration.Generated/**'
              - 'SharpMUSH.Contracts/**'
              - 'SharpMUSH.Parser.Generated/**'
              - 'global.json'
            server:
              - 'Dockerfile'
              - 'SharpMUSH.Server/**'
              - 'SharpMUSH.Client/**'
              - 'SharpMUSH.Implementation/**'
              - 'SharpMUSH.Implementation.Generated/**'
              - 'SharpMUSH.Library/**'
              - 'SharpMUSH.Messaging/**'
              - 'SharpMUSH.MarkupString/**'
              - 'SharpMUSH.Configuration/**'
              - 'SharpMUSH.Configuration.Generated/**'
              - 'SharpMUSH.Contracts/**'
              - 'SharpMUSH.Parser.Generated/**'
              - 'SharpMUSH.CodeAnalysis/**'
              - 'SharpMUSH.Database/**'
              - 'SharpMUSH.Database.ArangoDB/**'
              - 'SharpMUSH.Database.Memgraph/**'
              - 'SharpMUSH.Database.SurrealDB/**'
              - 'SharpMUSH.Documentation/**'
              - 'SharpMUSH.Plugins.Scene/**'
              - 'global.json'

      - name: Decide what to publish
        id: publish
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || '' }}
          SERVER_CHANGED: ${{ steps.changes.outputs.server }}
          CONN_CHANGED: ${{ steps.changes.outputs.connectionserver }}
        run: |
          {
            echo "server=$([ "$FORCE" = "all" ] || [ "$FORCE" = "server" ] || [ "$SERVER_CHANGED" = "true" ] && echo true || echo false)"
            echo "connectionserver=$([ "$FORCE" = "all" ] || [ "$FORCE" = "connectionserver" ] || [ "$CONN_CHANGED" = "true" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.publish.outputs.server == 'true' || steps.publish.outputs.connectionserver == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        if: steps.publish.outputs.server == 'true' || steps.publish.outputs.connectionserver == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push SharpMUSH Server (dev)
        if: steps.publish.outputs.server == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: sharpmush/sharpmush-server:dev
          labels: |
            org.opencontainers.image.title=SharpMUSH Server
            org.opencontainers.image.description=Modern MUSH server implementation (dev build)
            org.opencontainers.image.version=dev
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ConnectionServer (dev)
        if: steps.publish.outputs.connectionserver == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./SharpMUSH.ConnectionServer/Dockerfile
          push: true
          tags: sharpmush/sharpmush-connectionserver:dev
          labels: |
            org.opencontainers.image.title=SharpMUSH ConnectionServer
            org.opencontainers.image.description=Connection server for SharpMUSH (dev build)
            org.opencontainers.image.version=dev
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🐳 Dev Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.publish.outputs.server }}" = "true" ]; then
            echo "- \`sharpmush/sharpmush-server:dev\` — **pushed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`sharpmush/sharpmush-server:dev\` — skipped (inputs unchanged; watchtower will not restart it)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.publish.outputs.connectionserver }}" = "true" ]; then
            echo "- \`sharpmush/sharpmush-connectionserver:dev\` — **pushed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`sharpmush/sharpmush-connectionserver:dev\` — skipped (inputs unchanged; live connections stay up)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
