name: .NET Build and Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

  test:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        env:
          SHARPMUSH_ENABLE_TEST_TELEMETRY: true
          SHARPMUSH_TELEMETRY_OUTPUT_PATH: ${{ github.workspace }}/test-telemetry.md
        run: dotnet run --project SharpMUSH.Tests --no-build --verbosity normal -- --output Detailed

      - name: Publish Telemetry to Summary
        if: always()
        run: |
          if [ -f test-telemetry.md ]; then
            cat test-telemetry.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## 📊 Test Telemetry Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No telemetry data was recorded." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Telemetry Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-telemetry
          path: test-telemetry.md
          if-no-files-found: ignore
